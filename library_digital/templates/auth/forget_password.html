{% extends 'auth/layout.html' %}

{% block content %}
<!-- Background Decorative Elements -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-[10%] -right-[10%] w-[50%] h-[50%] bg-tertiary-container/5 rounded-full blur-[150px]"></div>
</div>
<!-- Main Content Canvas -->
<div class="flex justify-center items-center flex-grow w-full">
    <main class="w-full max-w-md px-6 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <!-- Brand Identity Section -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-container rounded-xl shadow-lg mb-6 group transition-transform duration-500 hover:scale-105">
                <span class="material-symbols-outlined text-on-primary-container text-3xl" data-icon="auto_stories">auto_stories</span>
            </div>
            <h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-background mb-2">Quên mật khẩu</h1>
            <p class="text-on-surface-variant font-medium max-w-[280px] mx-auto leading-relaxed">
                Vui lòng nhập email của bạn để nhận mã khôi phục mật khẩu
            </p>
        </div>
        <!-- Form Container -->
        <div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_24px_48px_-12px_rgba(83,53,40,0.06)] border border-outline-variant/15 relative overflow-hidden">
            <!-- Subtle Texture Overlays -->
            <div class="absolute top-0 right-0 p-4 opacity-[0.03] pointer-events-none">
                <span class="material-symbols-outlined text-9xl" data-icon="fingerprint">fingerprint</span>
            </div>
            <form class="space-y-6 relative z-10">
                <div class="space-y-2">
                    <label class="block text-xs font-semibold tracking-wider text-on-surface-variant uppercase ml-1"
                           for="email">Email</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span class="material-symbols-outlined text-outline text-xl" data-icon="mail">mail</span>
                        </div>
                        <input class="block w-full pl-12 pr-4 py-4 bg-surface-container-high border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-tertiary/30 focus:bg-surface-container-lowest transition-all duration-300 font-medium"
                               id="email" name="email" placeholder="example@library.com" required="" type="email"/>
                    </div>
                </div>
                <div class="pt-2">
                    <button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-lg shadow-md hover:shadow-xl hover:scale-[1.02] transition-all duration-300 active:scale-[0.98] flex items-center justify-center gap-2"
                            type="submit">
                        <span>Gửi mã xác nhận</span>
                        <span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </div>
            </form>
            <div class="mt-8 pt-6 border-t border-surface-variant flex items-center justify-center">
                <a class="text-sm font-semibold text-primary hover:text-primary-container transition-colors duration-200 flex items-center gap-1"
                   href="#">
                    <span class="material-symbols-outlined text-lg" data-icon="chevron_left">chevron_left</span>
                    Quay lại Đăng nhập
                </a>
            </div>
        </div>
    </main>
</div>

{% endblock %}
